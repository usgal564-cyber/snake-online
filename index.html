<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Duo Battle</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #lobby { margin-top: 50px; background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .score-board { display: flex; gap: 20px; margin: 10px; background: #0f3460; padding: 10px 20px; border-radius: 10px; }
        canvas { background: #000; border: 4px solid #e94560; border-radius: 10px; box-shadow: 0 0 15px #e94560; }
        input { padding: 12px; border-radius: 8px; border: none; margin: 5px; width: 180px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #e94560; color: white; cursor: pointer; font-weight: bold; }
        .controls { margin-top: 15px; display: grid; grid-template-columns: repeat(3, 50px); grid-gap: 5px; }
        .btn { width: 50px; height: 50px; background: #533483; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="lobby">
        <h2>🎮 Snake Battle Online</h2>
        <input type="text" id="username" placeholder="Нэрээ бич"> <br>
        <button onclick="createRoom()">Өрөө үүсгэх</button>
        <p>эсвэл</p>
        <input type="text" id="roomCode" placeholder="Код оруулах"> <br>
        <button onclick="joinRoom()" style="background: #0f3460;">Орох</button>
    </div>

    <div id="game-area" style="display:none;">
        <div id="room-id" style="color: #e94560; font-weight: bold; margin-top: 10px;"></div>
        <div class="score-board" id="scores"></div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="controls">
            <div></div><div class="btn" onclick="setDir(0, -1)">▲</div><div></div>
            <div class="btn" onclick="setDir(-1, 0)">◀</div><div class="btn" onclick="setDir(0, 1)">▼</div><div class="btn" onclick="setDir(1, 0)">▶</div>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let currentRoom, myName, myColor = '#4CAF50';
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}]; // 2 блоктой эхэлнэ
        let dx = 0, dy = 0, score = 0, food = {};

        function createRoom() {
            myName = document.getElementById('username').value || "Тоглогч 1";
            socket.emit('createRoom', { name: myName });
        }

        function joinRoom() {
            myName = document.getElementById('username').value || "Тоглогч 2";
            const code = document.getElementById('roomCode').value;
            socket.emit('joinRoom', { name: myName, code });
        }

        socket.on('roomCreated', code => start(code));
        socket.on('joinedSuccess', code => start(code));

        function start(code) {
            currentRoom = code;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('room-id').innerText = "ӨРӨӨНИЙ КОД: " + code;
            setInterval(update, 100);
        }

        function setDir(x, y) { dx = x; dy = y; }
        window.onkeydown = e => {
            if(e.key === 'ArrowUp' && dy === 0) setDir(0, -1);
            if(e.key === 'ArrowDown' && dy === 0) setDir(0, 1);
            if(e.key === 'ArrowLeft' && dx === 0) setDir(-1, 0);
            if(e.key === 'ArrowRight' && dx === 0) setDir(1, 0);
        };

        socket.on('gameState', data => {
            render(data);
            food = data.food;
        });

        function update() {
            if(dx === 0 && dy === 0) return;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                myColor = food.color; // Идэшний өнгөөр солигдоно
                socket.emit('foodEaten', { code: currentRoom });
            } else {
                snake.pop();
            }
            
            snake.unshift(head);
            socket.emit('updatePos', { code: currentRoom, snake, score, name: myName, color: myColor });
        }

        function render(data) {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Хоол зурах
            ctx.fillStyle = data.food.color;
            ctx.shadowBlur = 15; ctx.shadowColor = data.food.color;
            ctx.fillRect(data.food.x * 20, data.food.y * 20, 18, 18);
            ctx.shadowBlur = 0;

            // Оноо шинэчлэх
            let scoreHtml = "";
            for(let id in data.players) {
                const p = data.players[id];
                scoreHtml += `<span style="color:${p.color}">${p.name}: ${p.score}</span>`;
                
                // Бусад тоглогчдын могойг зурах
                ctx.fillStyle = p.color;
                p.snake.forEach(part => ctx.fillRect(part.x * 20, part.y * 20, 18, 18));
            }
            document.getElementById('scores').innerHTML = scoreHtml;
        }
    </script>
</body>
</html>
