<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Battle Royale</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0c29; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; }
        #lobby, #status-area { margin-top: 50px; background: rgba(255,255,255,0.1); padding: 30px; display: inline-block; border-radius: 15px; }
        canvas { background: #000; border: 3px solid #00d2ff; border-radius: 10px; display: none; margin-top: 20px; }
        .score-board { display: none; justify-content: center; gap: 30px; font-size: 20px; margin: 15px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; background: #00d2ff; color: #000; font-weight: bold; cursor: pointer; margin: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; }
        #rematch-btn { display: none; background: #39ff14; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>🐍 Snake Multiplayer</h1>
        <input type="text" id="username" placeholder="Нэрээ бич"><br>
        <button onclick="createRoom()">Өрөө үүсгэх</button><br>
        <input type="text" id="roomCode" placeholder="Код оруул"><br>
        <button onclick="joinRoom()" style="background: #9d50bb;">Өрөөнд орох</button>
    </div>

    <div id="status-area" style="display:none;">
        <h2 id="info-msg">Найзыгаа хүлээж байна...</h2>
        <button id="ready-btn" onclick="sendReady()">Би бэлэн!</button>
        <button id="rematch-btn" onclick="requestRematch()">Дахин тоглох уу?</button>
    </div>

    <div class="score-board" id="scoreBoard"></div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let myRoom, myName;

        function createRoom() {
            myName = document.getElementById('username').value || "Player";
            socket.emit('createRoom', { name: myName });
        }

        function joinRoom() {
            myName = document.getElementById('username').value || "Player";
            myRoom = document.getElementById('roomCode').value.toUpperCase();
            socket.emit('joinRoom', { name: myName, code: myRoom });
        }

        socket.on('roomCreated', code => { myRoom = code; showStatus(); });
        socket.on('joinedSuccess', code => { myRoom = code; showStatus(); });

        function showStatus() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('status-area').style.display = 'inline-block';
            document.getElementById('info-msg').innerText = "Өрөө: " + myRoom + ". Бэлэн товчийг дар!";
        }

        function sendReady() {
            socket.emit('playerReady', { code: myRoom, name: myName });
            document.getElementById('ready-btn').style.display = 'none';
            document.getElementById('info-msg').innerText = "Та бэлэн боллоо. Найзыгаа хүлээж байна...";
        }

        socket.on('gameStart', () => {
            document.getElementById('status-area').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'inline-block';
            document.getElementById('scoreBoard').style.display = 'flex';
        });

        window.onkeydown = e => {
            let dx = 0, dy = 0;
            if(e.key === 'ArrowUp') dy = -1;
            if(e.key === 'ArrowDown') dy = 1;
            if(e.key === 'ArrowLeft') dx = -1;
            if(e.key === 'ArrowRight') dx = 1;
            if(dx !== 0 || dy !== 0) socket.emit('updateInput', { code: myRoom, dx, dy });
        };

        socket.on('gameState', data => {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Food
            ctx.fillStyle = data.food.color;
            ctx.beginPath();
            ctx.arc(data.food.x * 20 + 10, data.food.y * 20 + 10, 8, 0, Math.PI*2);
            ctx.fill();

            // Players
            let scoresHtml = "";
            for(let id in data.players) {
                const p = data.players[id];
                ctx.fillStyle = p.color;
                p.snake.forEach((part, i) => {
                    ctx.globalAlpha = i === 0 ? 1 : 0.6;
                    ctx.fillRect(part.x * 20, part.y * 20, 19, 19);
                });
                ctx.globalAlpha = 1;
                scoresHtml += `<div style="color:${p.color}">${p.name}: ${p.score}</div>`;
            }
            document.getElementById('scoreBoard').innerHTML = scoresHtml;
        });

        socket.on('gameOver', msg => {
            alert(msg);
            document.getElementById('status-area').style.display = 'inline-block';
            document.getElementById('rematch-btn').style.display = 'inline-block';
            document.getElementById('info-msg').innerText = "Тоглоом дууслаа!";
        });

        function requestRematch() {
            socket.emit('rematchRequest', { code: myRoom });
        }

        socket.on('resetUI', () => {
            document.getElementById('rematch-btn').style.display = 'none';
            document.getElementById('ready-btn').style.display = 'inline-block';
            document.getElementById('info-msg').innerText = "Дахин тоглоход бэлэн үү?";
            document.getElementById('gameCanvas').style.display = 'none';
        });
    </script>
</body>
</html>
